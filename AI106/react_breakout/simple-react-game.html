<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple React Paddle Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      .wrap {
        text-align: center;
      }
      h1 {
        font-size: 1.3rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      p {
        font-size: 0.8rem;
        color: #9ca3af;
      }
      canvas {
        margin-top: 10px;
        background: #020617;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        box-shadow:
          0 0 30px rgba(56, 189, 248, 0.3),
          0 18px 40px rgba(15, 23, 42, 0.95);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      function SimplePaddleGame() {
        const canvasRef = useRef(null);
        const [score, setScore] = useState(0);

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          const W = canvas.width;
          const H = canvas.height;

          let ballX = W / 2;
          let ballY = H / 2;
          let dx = 3;
          let dy = -3;
          const r = 8;

          const paddleW = 70;
          const paddleH = 10;
          let paddleX = (W - paddleW) / 2;
          let right = false;
          let left = false;

          function keyDown(e) {
            if (e.key === "ArrowRight") right = true;
            else if (e.key === "ArrowLeft") left = true;
          }
          function keyUp(e) {
            if (e.key === "ArrowRight") right = false;
            else if (e.key === "ArrowLeft") left = false;
          }
          window.addEventListener("keydown", keyDown);
          window.addEventListener("keyup", keyUp);

          function draw() {
            ctx.clearRect(0, 0, W, H);

            // ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, r, 0, Math.PI * 2);
            ctx.fillStyle = "#38bdf8";
            ctx.fill();

            // paddle
            const paddleY = H - 20;
            ctx.fillStyle = "#22c55e";
            ctx.fillRect(paddleX, paddleY, paddleW, paddleH);

            // score
            ctx.fillStyle = "#e5e7eb";
            ctx.font = "14px system-ui";
            ctx.fillText("Score: " + score, 8, 18);

            // movement
            if (right && paddleX < W - paddleW) paddleX += 4;
            else if (left && paddleX > 0) paddleX -= 4;

            ballX += dx;
            ballY += dy;

            // walls
            if (ballX + dx > W - r || ballX + dx < r) dx = -dx;
            if (ballY + dy < r) dy = -dy;

            // paddle / bottom
            if (ballY + dy > H - r - 20) {
              if (ballX > paddleX && ballX < paddleX + paddleW) {
                dy = -dy;
                setScore((s) => s + 1);
              } else if (ballY + dy > H - r) {
                // reset
                ballX = W / 2;
                ballY = H / 2;
                dx = 3;
                dy = -3;
                setScore(0);
              }
            }

            requestAnimationFrame(draw);
          }

          requestAnimationFrame(draw);

          return () => {
            window.removeEventListener("keydown", keyDown);
            window.removeEventListener("keyup", keyUp);
          };
        }, [score]);

        return (
          <div className="wrap">
            <h1>Simple React Paddle</h1>
            <p>Move with LEFT / RIGHT. Keep the ball up to raise your score.</p>
            <canvas ref={canvasRef} width={480} height={300} />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<SimplePaddleGame />);
    </script>
  </body>
</html>
